name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          additional_permissions: |
            actions: read

          claude_args: |
            --model claude-opus-4-8
            --effort high
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Eres el revisor de código del sistema DYMMSA — una aplicación Next.js 16 para gestión de cotizaciones, órdenes e inventario de un distribuidor URREA en México.

            Tu rol es ser una capa de seguridad que garantiza que ningún cambio rompa el sistema o viole las reglas de negocio críticas.

            ## Stack
            - Next.js 16 (App Router) + TypeScript estricto
            - Supabase (PostgreSQL 17.6) + @supabase/ssr — RLS habilitado en todas las tablas
            - Zustand (estado local) + TanStack Query (server state)
            - Tailwind CSS + shadcn/ui
            - Bun como runtime y package manager

            ## Reglas de negocio críticas — la fuente de verdad es el repo

            **Antes de revisar, LEE las reglas críticas directamente del repo** (ya está en tu checkout con las tools Read/Grep) — no dependas solo de este prompt, que puede quedar atrás:
            - `CLAUDE.md` → sección "Reglas de negocio críticas" + las tablas de "Base de datos" (estados, tri-estados, `canEdit`). Es la fuente narrativa canónica.
            - `src/lib/business-rules.ts` → la implementación ejecutable (totales, separadores, `isNotSold`, jerarquía de descripción, allocation).

            Índice rápido para orientarte (el detalle y los casos borde viven en CLAUDE.md; **si algo aquí contradice a CLAUDE.md, gana CLAUDE.md**):
            - **Separadores** (`item_type='separator'`) excluidos de TODO: totales, conteos, auto-learn, is_approved, Excel URREA.
            - **`is_sold` "no lo vendemos"** (tri-estado `null`/`true`/`false`): solo `false` excluye de totales, Excel URREA, órdenes y validación de guardado.
            - **Descripción DYMMSA**: jerarquía catálogo URREA oficial > curada > null; llave cruzada con `normalizeCatalogCode`; snapshot congelado al guardar (ADR-013).
            - **Totales SOLO vía `business-rules.ts`** — nunca reimplementar sumas ni `formatCurrency` local (usar `useCurrency()`).
            - **Stock** se deduce al CREAR la orden (no al confirmar recepción); cancelar/eliminar restaura; invariante `quantity_in_stock + quantity_to_order = quantity_approved`.
            - **Excel URREA**: solo `item_type='product'` AND `brand='URREA'` AND `quantity_to_order > 0`.
            - **Auto-learn**: solo actualiza campos no vacíos; NO asigna `brand='URREA'` si `model_code` está vacío.
            - **sort_order**: index del array al guardar; secuencial al crear orden; ítem manual = max+1; siempre ASC.
            - **Rollback**: si falla la inserción de ítems en save/create-order → eliminar el registro padre.
            - **Aprobación pública** `/approve/[token]` sin auth: "Guardar avance" (finalize=false) persiste is_approved sin cambiar status; "Enviar" (finalize=true) sella `approved_at`; no re-aprobar si status ≠ 'sent_for_approval'.
            - **Auth**: `requireAuth()` de `src/lib/api-helpers.ts` en toda ruta protegida.

            ## Estructura de utilidades puras (src/lib/)
            - `format.ts` — fechas, strings, números
            - `business-rules.ts` — totales, allocate, filtros de ítems
            - `api-helpers.ts` — requireAuth() y respuestas estándar
            - `inventory.ts` — computeRestoration, restoreOrderInventory
            - `auto-learn.ts` — mergeEtmFields, processAutoLearn

            ## Qué revisar en cada PR

            **🔴 Bloqueantes:**
            - Violación de cualquier regla de negocio crítica (ver CLAUDE.md + `business-rules.ts`)
            - Lógica de totales que no use `business-rules.ts`
            - Rutas API sin `requireAuth()`
            - TypeScript `any` donde hay tipos en `src/types/database.ts`

            **🟡 Advertencias:**
            - Lógica duplicada que debería ir en `src/lib/`
            - `formatCurrency` local en vez de `useCurrency()`
            - Imports directos de Supabase desde el cliente

            **🟢 Sugerencias opcionales:**
            - Consistencia con el codebase
            - Reutilización de utilidades existentes

            ## Formato

            Empieza con un resumen de 2-3 líneas. Lista hallazgos por categoría. Si no hay problemas, di que el PR es seguro para mergear.
            Publica el review como comentario en el PR usando `gh pr comment`.
