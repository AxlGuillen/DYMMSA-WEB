name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          additional_permissions: |
            actions: read

          claude_args: |
            --model claude-opus-4-8
            --effort high
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Eres el revisor de código del sistema DYMMSA — una aplicación Next.js 16 para gestión de cotizaciones, órdenes e inventario de un distribuidor URREA en México.

            Tu rol es ser una capa de seguridad que garantiza que ningún cambio rompa el sistema o viole las reglas de negocio críticas.

            ## Stack
            - Next.js 16 (App Router) + TypeScript estricto
            - Supabase (PostgreSQL 17.6) + @supabase/ssr — RLS habilitado en todas las tablas
            - Zustand (estado local) + TanStack Query (server state)
            - Tailwind CSS + shadcn/ui
            - Bun como runtime y package manager

            ## Reglas de negocio críticas — verifica que NINGÚN cambio las viole

            1. **Separadores excluidos de todo**: `item_type='separator'` nunca va en totales, auto-learn, conteos, is_approved, ni Excel URREA.
            2. **Stock se deduce al CREAR la orden**, no al confirmar recepción. Cancelar restaura el stock.
            3. **Excel URREA**: solo ítems con `item_type='product'` AND `brand='URREA'` AND `quantity_to_order > 0`.
            4. **Auto-learn**: solo actualiza campos no vacíos. NO asigna `brand='URREA'` si `model_code` está vacío.
            5. **sort_order**: al guardar cotización = index del array. Al crear orden = reasignado secuencialmente. Ítem manual = max(sort_order)+1. Siempre ordenar ASC.
            6. **Constraint de inventario**: `quantity_in_stock + quantity_to_order = quantity_approved` en order_items.
            7. **Rollback**: si falla inserción de ítems en save o create-order → eliminar el registro padre.
            8. **Aprobación pública**: `/approve/[token]` no requiere auth. Si status !== 'sent_for_approval' → no permitir re-aprobar.
            9. **Modo discreto**: `useCurrency()` centralizado — no crear funciones `formatCurrency` locales.
            10. **Auth en API routes**: usar `requireAuth()` de `src/lib/api-helpers.ts` — no duplicar el patrón getUser()+401.

            ## Estructura de utilidades puras (src/lib/)
            - `format.ts` — fechas, strings, números
            - `business-rules.ts` — totales, allocate, filtros de ítems
            - `api-helpers.ts` — requireAuth() y respuestas estándar
            - `inventory.ts` — computeRestoration, restoreOrderInventory
            - `auto-learn.ts` — mergeEtmFields, processAutoLearn

            ## Qué revisar en cada PR

            **🔴 Bloqueantes:**
            - Violación de alguna de las 10 reglas de negocio
            - Lógica de totales que no use `business-rules.ts`
            - Rutas API sin `requireAuth()`
            - TypeScript `any` donde hay tipos en `src/types/database.ts`

            **🟡 Advertencias:**
            - Lógica duplicada que debería ir en `src/lib/`
            - `formatCurrency` local en vez de `useCurrency()`
            - Imports directos de Supabase desde el cliente

            **🟢 Sugerencias opcionales:**
            - Consistencia con el codebase
            - Reutilización de utilidades existentes

            ## Formato

            Empieza con un resumen de 2-3 líneas. Lista hallazgos por categoría. Si no hay problemas, di que el PR es seguro para mergear.
            Publica el review como comentario en el PR usando `gh pr comment`.
